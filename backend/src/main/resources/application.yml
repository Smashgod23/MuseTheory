server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:musetheory}
    username: ${DB_USERNAME:musetheory}
    password: ${DB_PASSWORD:musetheory}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

app:
  jwt:
    secret: ${JWT_SECRET:bXVzZXRoZW9yeS1kZXYtc2VjcmV0LWtleS10aGF0LWlzLWxvbmctZW5vdWdoLWZvci1obWFjLXNoYTI1Ng==}
    expiration-ms: ${JWT_EXPIRATION:86400000}
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
  aws:
    access-key: ${AWS_ACCESS_KEY:minioadmin}
    secret-key: ${AWS_SECRET_KEY:minioadmin}
    region: ${AWS_REGION:us-east-1}
    s3:
      bucket: ${S3_BUCKET:musetheory-audio}
      base-url: ${S3_BASE_URL:http://localhost:9000/musetheory-audio}
      endpoint: ${S3_ENDPOINT:http://localhost:9000}

logging:
  level:
    com.musetheory.api: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
